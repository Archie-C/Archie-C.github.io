<!DOCTYPE html>
<html lang="en" data-palette="slate">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: 6px; border: 1px solid var(--rule); padding: 8px 10px; display: flex; flex-direction: column; justify-content: flex-end; }
  .sw .n { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .title { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin: 0 0 12px; display: flex; gap: 10px; align-items: center; }
  .title strong { font-weight: 600; color: var(--fg); letter-spacing: 0; text-transform: none; font-size: 14px; }
</style>
</head>
<body>
  <div class="title"><strong>Slate</strong> cool paper · ink-blue · journal-feel</div>
  <div class="row">
    <div class="sw" style="background:#F4F4F1;"><span class="n" style="color:#15171C">bg</span><span class="h" style="color:#5E6470">#F4F4F1</span></div>
    <div class="sw" style="background:#EBEBE7;"><span class="n" style="color:#15171C">bg-2</span><span class="h" style="color:#5E6470">#EBEBE7</span></div>
    <div class="sw" style="background:#E7E7E2;"><span class="n" style="color:#15171C">sunk</span><span class="h" style="color:#5E6470">#E7E7E2</span></div>
    <div class="sw" style="background:#15171C;"><span class="n" style="color:#F4F4F1">fg</span><span class="h" style="color:#9298A2">#15171C</span></div>
    <div class="sw" style="background:#5E6470;"><span class="n" style="color:#F4F4F1">fg-3</span><span class="h" style="color:#DDDDD7">#5E6470</span></div>
    <div class="sw" style="background:#2A5FB0;"><span class="n" style="color:#F4F4F1">accent</span><span class="h" style="color:#D8E2F2">#2A5FB0</span></div>
  </div>
</body>
</html>
