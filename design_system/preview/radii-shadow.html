<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px 28px; }
  .title { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin: 0 0 16px; }
  .row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .swatch { width: 64px; height: 48px; background: var(--bg-2); border: 1px solid var(--rule); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
  hr { margin: 18px 0 14px; }
  .shadow-row { display: flex; gap: 28px; }
  .sb { background: var(--bg); padding: 16px 18px; font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .sb.s1 { box-shadow: var(--shadow-1); }
  .sb.s2 { box-shadow: var(--shadow-2); border-radius: 8px; }
</style>
</head>
<body>
  <div class="title">corner radii</div>
  <div class="row">
    <div class="item"><div class="swatch" style="border-radius: 0;"></div><span class="name">--radius-0</span><span class="px">0 px</span></div>
    <div class="item"><div class="swatch" style="border-radius: 4px;"></div><span class="name">--radius-sm</span><span class="px">4 px</span></div>
    <div class="item"><div class="swatch" style="border-radius: 8px;"></div><span class="name">--radius-md</span><span class="px">8 px</span></div>
    <div class="item"><div class="swatch" style="border-radius: 12px;"></div><span class="name">--radius-lg</span><span class="px">12 px</span></div>
    <div class="item"><div class="swatch" style="border-radius: 999px; width: 96px;"></div><span class="name">--radius-pill</span><span class="px">999 px</span></div>
  </div>
  <hr/>
  <div class="title">shadow — two tiers</div>
  <div class="shadow-row">
    <div class="sb s1">shadow-1 · hairline</div>
    <div class="sb s2">shadow-2 · soft drop</div>
  </div>
</body>
</html>
