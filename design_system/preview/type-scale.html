<!-- preview card: type scale -->
<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: 96px 1fr 80px; gap: 20px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--rule); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }
  .px  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); text-align: right; }
  .sample { font-family: var(--font-mono); font-weight: 600; letter-spacing: -0.01em; color: var(--fg); }
</style>
</head>
<body>
  <div class="row"><span class="tag">display-1</span><span class="sample" style="font-size: var(--text-5xl); font-weight: 700; letter-spacing: -0.02em;">a.c</span><span class="px">76.8 / 88</span></div>
  <div class="row"><span class="tag">display-2</span><span class="sample" style="font-size: var(--text-4xl); font-weight: 700; letter-spacing: -0.02em;">why nets learn</span><span class="px">56 / 64</span></div>
  <div class="row"><span class="tag">h1</span><span class="sample" style="font-size: var(--text-3xl); font-weight: 700;">on convergence</span><span class="px">41.6 / 48</span></div>
  <div class="row"><span class="tag">h2</span><span class="sample" style="font-size: var(--text-2xl);">spectral bias</span><span class="px">32 / 37</span></div>
  <div class="row"><span class="tag">h3</span><span class="sample" style="font-size: var(--text-xl);">a small example</span><span class="px">25.6 / 29</span></div>
  <div class="row"><span class="tag">h4</span><span class="sample" style="font-size: var(--text-lg); font-weight: 500;">notation</span><span class="px">21.3 / 24</span></div>
  <div class="row"><span class="tag">body</span><span class="sample" style="font-family: var(--font-sans); font-weight: 400; letter-spacing: 0;">The reader is a peer.</span><span class="px">16 / 26</span></div>
</body>
</html>
