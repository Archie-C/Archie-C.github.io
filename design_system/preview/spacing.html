<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px 28px; }
  .title { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin: 0 0 14px; }
  .scale { display: grid; grid-template-columns: 60px 1fr 60px; row-gap: 10px; column-gap: 14px; align-items: center; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .bar { height: 10px; background: var(--fg); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); text-align: right; }
</style>
</head>
<body>
  <div class="title">spacing — 4-px base, modular</div>
  <div class="scale">
    <div class="name">space-1</div><div class="bar" style="width: 4px;"></div><div class="px">4 px</div>
    <div class="name">space-2</div><div class="bar" style="width: 8px;"></div><div class="px">8 px</div>
    <div class="name">space-3</div><div class="bar" style="width: 12px;"></div><div class="px">12 px</div>
    <div class="name">space-4</div><div class="bar" style="width: 16px;"></div><div class="px">16 px</div>
    <div class="name">space-5</div><div class="bar" style="width: 24px;"></div><div class="px">24 px</div>
    <div class="name">space-6</div><div class="bar" style="width: 32px;"></div><div class="px">32 px</div>
    <div class="name">space-7</div><div class="bar" style="width: 48px;"></div><div class="px">48 px</div>
    <div class="name">space-8</div><div class="bar" style="width: 64px;"></div><div class="px">64 px</div>
    <div class="name">space-9</div><div class="bar" style="width: 96px;"></div><div class="px">96 px</div>
    <div class="name">space-10</div><div class="bar" style="width: 128px;"></div><div class="px">128 px</div>
  </div>
</body>
</html>
