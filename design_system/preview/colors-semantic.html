<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px 28px; }
  .title { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--rule); }
  .row:last-child, .row:nth-last-child(2) { border-bottom: 0; }
  .chip { width: 28px; height: 18px; border-radius: 4px; border: 1px solid var(--rule); flex-shrink: 0; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .desc { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin-left: auto; }
</style>
</head>
<body>
  <div class="title">semantic tokens — what components consume</div>
  <div class="grid">
    <div class="row"><span class="chip" style="background:var(--bg);"></span><span class="name">--bg</span><span class="desc">canvas</span></div>
    <div class="row"><span class="chip" style="background:var(--fg);"></span><span class="name">--fg</span><span class="desc">primary ink</span></div>
    <div class="row"><span class="chip" style="background:var(--bg-2);"></span><span class="name">--bg-2</span><span class="desc">cards, insets</span></div>
    <div class="row"><span class="chip" style="background:var(--fg-2);"></span><span class="name">--fg-2</span><span class="desc">secondary</span></div>
    <div class="row"><span class="chip" style="background:var(--bg-sunk);"></span><span class="name">--bg-sunk</span><span class="desc">code, math</span></div>
    <div class="row"><span class="chip" style="background:var(--fg-3);"></span><span class="name">--fg-3</span><span class="desc">captions</span></div>
    <div class="row"><span class="chip" style="background:var(--rule);"></span><span class="name">--rule</span><span class="desc">1px lines</span></div>
    <div class="row"><span class="chip" style="background:var(--fg-4);"></span><span class="name">--fg-4</span><span class="desc">placeholder</span></div>
    <div class="row"><span class="chip" style="background:var(--accent);"></span><span class="name">--accent</span><span class="desc">links, primary</span></div>
    <div class="row"><span class="chip" style="background:var(--accent-soft);"></span><span class="name">--accent-soft</span><span class="desc">tinted bg</span></div>
  </div>
</body>
</html>
