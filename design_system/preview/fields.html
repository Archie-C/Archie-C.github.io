<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 22px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
  label { display: block; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: 6px; }
  .field { display: flex; flex-direction: column; }
  input, select, textarea { font-family: var(--font-sans); font-size: 14px; color: var(--fg); background: var(--bg); border: 1px solid var(--rule); border-radius: 4px; padding: 8px 10px; outline: none; transition: border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
  input::placeholder { color: var(--fg-4); }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .help { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin-top: 6px; }
  .row-cb { display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 14px; color: var(--fg); }
</style>
</head>
<body>
  <div class="field">
    <label>email</label>
    <input type="email" placeholder="ac@cantab.net" />
    <span class="help">for paper updates, ~quarterly</span>
  </div>
  <div class="field">
    <label>citation style</label>
    <select><option>BibTeX</option><option>APA</option><option>Chicago</option></select>
  </div>
  <div class="field" style="grid-column: span 2;">
    <label>question for office hours</label>
    <textarea rows="2" placeholder="What's been confusing in the readings?"></textarea>
  </div>
  <div class="row-cb"><input type="checkbox" checked id="c1"/><label for="c1" style="margin: 0; text-transform: none; letter-spacing: 0; color: var(--fg); font-family: var(--font-sans); font-size: 14px;">subscribe to the reading group</label></div>
  <div class="row-cb"><input type="checkbox" id="c2"/><label for="c2" style="margin: 0; text-transform: none; letter-spacing: 0; color: var(--fg); font-family: var(--font-sans); font-size: 14px;">notify me about open positions</label></div>
</body>
</html>
