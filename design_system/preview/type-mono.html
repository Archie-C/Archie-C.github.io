<!DOCTYPE html>
<html lang="en" data-palette="paper">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px 28px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px; }
  .display { font-family: var(--font-mono); font-weight: 700; font-size: 44px; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg); }
  .dot { color: var(--accent); }
  .meta { margin-top: 14px; display: flex; gap: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
</style>
</head>
<body>
  <div class="label">display — JetBrains Mono</div>
  <div class="display">a<span class="dot">.</span>c — on the geometry<br/>of learning</div>
  <div class="meta"><span>weight 500–700</span><span>tracking −0.02em</span><span>line-height 1.05–1.15</span><span>sentence case</span></div>
</body>
</html>
