name: Sync exercises to Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Checkout teaching repo
        uses: actions/checkout@v4
        with:
          repository: Archie-C/deep-learning-aau
          ref: main
          path: teaching

      - name: Copy exercises into deep-learning-aau folder
        run: |
          mkdir -p docs/deep-learning-aau
          rm -rf docs/deep-learning-aau/*
          cp -r teaching/exercises/* docs/deep-learning-aau/

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Sync exercises"
          git push