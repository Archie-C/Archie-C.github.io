name: Sync deep-learning-aau to Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Checkout teaching repo
        uses: actions/checkout@v4
        with:
          repository: Archie-C/deep-learning-aau
          ref: main
          path: teaching

      - name: Copy into deep-learning-aau folder
        run: |
          mkdir -p deep-learning-aau
          rm -rf deep-learning-aau/*
          cp teaching/index.html deep-learning-aau/index.html
          cp -r teaching/exercises deep-learning-aau/exercises
          cp -r teaching/lectures deep-learning-aau/lectures

      - name: Add .nojekyll
        run: touch .nojekyll

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deep-learning-aau .nojekyll
          git diff --cached --quiet || git commit -m "Sync deep-learning-aau"
          git push